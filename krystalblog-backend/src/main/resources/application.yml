server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: krystalblog-backend

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 2048MB
      max-request-size: 2048MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.krystalblog.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  upload:
    path: ./uploads             # oss未启用时存储本地路径
  oss:
    enabled: ${OSS_ENABLE:false}
    endpoint: ${OSS_ENDPOINT}
    bucket: ${OSS_BUCKET}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    cdn-domain:
    encryption:
      enabled: true
      type: AES256
      kms-key-id:
    presign:
      download-ttl-seconds: 600
      preview-ttl-seconds: 600
    multipart:
      part-size-bytes: 8388608
      max-parts: 10000
    migration:
      run: false
      batch-size: 200
      max-retries: 3
      report-path:
  jwt:
    secret: krystalblog-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    access-token-expiration: 86400000   # 24 hours
    refresh-token-expiration: 604800000 # 7 days

logging:
  config: classpath:logback-spring.xml
